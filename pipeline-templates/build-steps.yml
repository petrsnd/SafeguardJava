parameters:
- name: mavenGoals
  type: string
  default: 'package'
- name: mavenOptions
  type: string
  default: '-X --batch-mode --no-transfer-progress -Drevision=$(version)'
- name: signJars
  type: boolean
  default: false

steps:
- task: Bash@3
  inputs:
    targetType: 'inline'
    script: 'env | sort'
  displayName: 'Display environment variables'

- task: Maven@4
  inputs:
    mavenPomFile: 'pom.xml'
    mavenOptions: '-Xmx3072m'
    Options: '${{ parameters.mavenOptions }}'
    javaHomeOption: 'JDKVersion'
    jdkVersionOption: '1.8'
    jdkArchitectureOption: 'x64'
    publishJUnitResults: true
    testResultsFiles: '**/surefire-reports/TEST-*.xml'
    goals: '${{ parameters.mavenGoals }}'
  displayName: 'Maven ${{ parameters.mavenGoals }} SafeguardJava $(version)'

- ${{ if parameters.signJars }}:
  - task: Bash@3
    inputs:
      targetType: 'inline'
      workingDirectory: '$(Build.BinariesDirectory)/CodeSignTool'
      script: |
        set -e
        # CodeSignTool requires Java 8 (fails with Java 17+ due to JPMS module access restrictions)
        export JAVA_HOME="$JAVA_HOME_8_X64"
        export PATH="$JAVA_HOME/bin:$PATH"
        echo "Using Java: $(java -version 2>&1 | head -1)"
        JAR_FILE="$(Build.SourcesDirectory)/target/safeguardjava-$(version).jar"
        echo "Signing JAR: $JAR_FILE"
        ./CodeSignTool.sh sign \
          -username "ssl.oid.safeguardpp@groups.quest.com" \
          -password "$(SPPCodeSigning-Password)" \
          -totp_secret "$(SPPCodeSigning-TotpPrivateKey)" \
          -input_file_path "$JAR_FILE" \
          -override
        echo "Verifying JAR signature..."
        jarsigner -verify -verbose "$JAR_FILE" | head -20
    displayName: 'Sign JAR with SSL.com CodeSignTool'

- task: CopyFiles@2
  inputs:
    sourceFolder: '$(Build.SourcesDirectory)/$(targetDir)'
    contents: '*.jar'
    targetFolder: $(Build.ArtifactStagingDirectory)
  displayName: 'Copy JAR files to staging folder'

- task: CopyFiles@2
  inputs:
    sourceFolder: '$(Build.SourcesDirectory)/$(targetDir)'
    contents: '**/lib/**'
    targetFolder: $(Build.ArtifactStagingDirectory)
  displayName: 'Copy dependency libs to staging folder'

- task: PublishBuildArtifacts@1
  inputs:
    pathToPublish: '$(Build.ArtifactStagingDirectory)'
    artifactName: 'SafeguardJava'
  displayName: 'Publish build artifacts'

- task: Bash@3
  inputs:
    targetType: 'inline'
    script: 'ls -la $(Build.ArtifactStagingDirectory)'
  displayName: 'List staging directory'
