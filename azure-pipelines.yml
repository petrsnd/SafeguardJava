# SafeguardJava CI/CD Pipeline
# Build, sign, and publish the SafeguardJava SDK to Maven Central and GitHub Packages.

variables:
- template: pipeline-templates/global-variables.yml

trigger:
  branches:
    include: [ master, release-* ]
  paths:
    exclude:
      - README.md
      - AGENTS.md

pr:
  branches:
    include: [ master, release-* ]
  paths:
    exclude:
      - README.md
      - AGENTS.md

jobs:
# Job 1: PR Validation - runs only on pull requests
- job: PRValidation
  displayName: 'PR Validation: Build SafeguardJava SDK'
  condition: eq(variables['Build.Reason'], 'PullRequest')

  variables:
  - template: pipeline-templates/job-variables.yml

  pool:
    vmImage: 'ubuntu-latest'

  steps:
  - template: pipeline-templates/build-steps.yml

# Job 2: Build and Publish - runs only on successful merges (not PRs)
- job: BuildAndPublish
  displayName: 'Build, sign, and publish SafeguardJava SDK'
  condition: ne(variables['Build.Reason'], 'PullRequest')

  variables:
  - template: pipeline-templates/job-variables.yml

  pool:
    vmImage: 'ubuntu-latest'

  steps:
  # --- Secrets ---
  - task: AzureKeyVault@2
    inputs:
      azureSubscription: 'SafeguardOpenSource'
      keyVaultName: 'SafeguardBuildSecrets'
      secretsFilter: '*'
    displayName: 'Get build secrets from Azure Key Vault'

  - task: AzureKeyVault@2
    inputs:
      ConnectedServiceName: 'OneIdentity.Infrastructure.SPPCodeSigning'
      KeyVaultName: 'SPPCodeSigning'
      SecretsFilter: 'SPPCodeSigning-Password, SPPCodeSigning-TotpPrivateKey'
    displayName: 'Get code signing credentials from Azure Key Vault'

  # --- GPG setup (for Maven Central signatures) ---
  - script: echo ${SIGNINGGKEY} > $(Build.BinariesDirectory)/signingkey.org
    env:
      SIGNINGGKEY: $(GpgCodeSigningKey)
    displayName: 'Save GPG signing key'

  - task: Bash@3
    inputs:
      targetType: 'inline'
      script: |
        export GPG_TTY=$(tty)
        sed 's/\\n/\n/g' $(Build.BinariesDirectory)/signingkey.org > $(Build.BinariesDirectory)/signingkey.asc
        gpg --batch --import $(Build.BinariesDirectory)/signingkey.asc
    displayName: 'Import GPG signing key'

  # --- CodeSignTool setup (for JAR signing via SSL.com eSigner) ---
  - task: Bash@3
    inputs:
      targetType: 'inline'
      script: |
        set -e
        echo "Downloading CodeSignTool for Linux..."
        curl -sL "https://www.ssl.com/download/codesigntool-for-linux/" -o CodeSignTool.zip
        mkdir -p $(Build.BinariesDirectory)/CodeSignTool
        unzip -o CodeSignTool.zip -d $(Build.BinariesDirectory)/CodeSignTool
        # Handle subdirectory nesting (zip may contain CodeSignTool-vX.Y.Z/ folder)
        if [ ! -f "$(Build.BinariesDirectory)/CodeSignTool/CodeSignTool.sh" ]; then
          mv $(Build.BinariesDirectory)/CodeSignTool/CodeSignTool-v*/* $(Build.BinariesDirectory)/CodeSignTool/ 2>/dev/null || true
        fi
        chmod +x $(Build.BinariesDirectory)/CodeSignTool/CodeSignTool.sh
        echo "CodeSignTool installed:"
        ls -la $(Build.BinariesDirectory)/CodeSignTool/
    displayName: 'Download and install CodeSignTool'

  # --- Build, sign, and deploy (single Maven invocation + JAR signing) ---
  - template: pipeline-templates/build-steps.yml
    parameters:
      mavenGoals: 'deploy'
      mavenOptions: '-X --batch-mode --no-transfer-progress --settings $(Build.SourcesDirectory)/settings/settings.xml -P release -Dsonatypeusername=$(SonatypeUserToken) -Dsonatypepassword=$(SonatypeRepositoryPassword) -Drevision=$(version) -Dgpgkeyname=$(gpgKeyName)'
      signJars: true

  # --- Publish to GitHub Packages and create release ---
  - task: Bash@3
    inputs:
      targetType: 'inline'
      script: |
        mvn deploy:deploy-file \
          -DrepositoryId=github \
          -Durl=https://maven.pkg.github.com/OneIdentity/SafeguardJava \
          -DpomFile=pom.xml \
          -Dfile=target/safeguardjava-$(version).jar \
          -Dsources=target/safeguardjava-$(version)-sources.jar \
          -Djavadoc=target/safeguardjava-$(version)-javadoc.jar \
          -Drevision=$(version) \
          -Dgithubusername=OneIdentity \
          -Dgithubtoken=$(GitHubPackagesToken) \
          --settings $(Build.SourcesDirectory)/settings/settings.xml
    displayName: 'Publish to GitHub Packages'

  - task: GitHubRelease@1
    inputs:
      gitHubConnection: 'PangaeaBuild-GitHub'
      repositoryName: 'OneIdentity/SafeguardJava'
      action: 'create'
      target: '$(Build.SourceVersion)'
      tagSource: 'userSpecifiedTag'
      tag: 'release-$(version)'
      title: '$(version)'
      isPreRelease: $(isPrerelease)
      changeLogCompareToRelease: 'lastFullRelease'
      changeLogType: 'commitBased'
      assets: '$(Build.ArtifactStagingDirectory)/*.jar'
    displayName: 'Create GitHub release'
